[alembic]
script_location = alembic
prepend_sys_path = .
# Timestamped, ordered filenames: migrations are read in git history far more
# often than they are run, and a bare hash tells you nothing about when.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

# sqlalchemy.url is set in env.py from DATABASE_URL. Leaving it here would mean
# a real credential in a committed file.

# Formatting is left to `uv run ruff format .`; wiring it as a post-write hook
# only works when ruff resolves as a console_scripts entrypoint in the alembic
# process, which it does not under uv's isolated environment.
[post_write_hooks]
hooks =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
