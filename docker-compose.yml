name: trading-platform

services:
  postgres:
    # 16 rather than 17: nothing in this schema needs 17, and pinning to a
    # widely-cached tag keeps a cold `docker compose up` from blocking on a
    # large pull. TimescaleDB (§1, optional) builds on 16 too.
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-trading_platform}
      # Deterministic collation: index ordering must not depend on the host locale.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      # Host port defaults to 5433, not 5432, so this stack coexists with any
      # other local Postgres. The container port is unchanged, so nothing
      # inside the compose network is affected.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` alone returns true while the init scripts are still
      # running, so dependent services would start against a half-built
      # database. Naming the user and database waits for the real thing.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persist to disk: Redis holds the per-minute provider budget counters, and
    # losing them silently restores spend we have already made (§4).
    command: redis-server --appendonly yes --save 60 1
    ports:
      # 6380 on the host for the same reason as Postgres above.
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network, reach services by name rather than localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading_dev_password_change_me}@postgres:5432/${POSTGRES_DB:-trading_platform}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading_dev_password_change_me}@postgres:5432/${POSTGRES_DB:-trading_platform}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api
      - ./apps/worker:/app/apps/worker

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      # Browser-side calls resolve from the host, not the compose network, so
      # this must be a host-reachable URL rather than http://api:8000.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
