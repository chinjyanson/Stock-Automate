packages:
  - "apps/web"
  - "packages/*"

# pnpm blocks postinstall scripts by default. These three are required rather
# than optional: esbuild and unrs-resolver ship platform binaries that Vitest
# and ESLint cannot run without, and sharp backs Next's image optimisation.
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
